apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-api
  labels:
    app: todo-api
spec:
  selector:
    matchLabels:
      app: todo-api
  template:
    metadata:
      labels:
        app: todo-api
    spec:
      containers:
        - name: todo-api
          image: todo-api
          ports:
            - containerPort: 9191
          volumeMounts:
            - name: storage
              mountPath: /storage
            - name: source
              mountPath: /app
      volumes:
        - name: storage
          hostPath:
            path: __REPO_PATH__/data/todo-app-storage/
            type: Directory
        - name: source
          hostPath:
            path: __REPO_PATH__/
            type: Directory

---
apiVersion: v1
kind: Service
metadata:
  name: todo-api
spec:
  selector:
    app: todo-api
  type: ClusterIP
  ports:
    - port: 9191
      protocol: TCP
      targetPort: 9191
