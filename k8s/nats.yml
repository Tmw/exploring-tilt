apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  labels:
    app: nats
spec:
  selector:
    matchLabels:
      app: nats
  replicas: 1
  template:
    metadata:
      labels:
        app: nats
    spec:
      containers:
        - name: nats
          image: nats:2.14
          args:
            - "-js"
            - "-m"
            - "8222"
            - "-config"
            - "/nats/config/nats-config.conf"
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          volumeMounts:
            - name: config
              mountPath: /nats/config
              readOnly: true
            - name: storage
              mountPath: /data/nats
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: storage
          hostPath:
            path: __REPO_PATH__/data/nats
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: nats
spec:
  selector:
    app: nats
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
data:
  nats-config.conf: |
    jetstream {
      store_dir: /data/nats
    }
